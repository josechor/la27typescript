services:
  api:
    build: .
    container_name: la27_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://la27user:la27password@db:5432/la27db?schema=public
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: la27_db
    environment:
      POSTGRES_USER: la27user
      POSTGRES_PASSWORD: la27password
      POSTGRES_DB: la27db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U la27user -d la27db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
